version: "3.8"

services:

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  user-service:
    build: ./user-service
    ports:
      - "8081:8081"
    depends_on:
      - kafka

  transaction-service:
    build: ./transaction-service
    ports:
      - "8082:8082"
    depends_on:
      - kafka

  wallet-service:
    build: ./wallet-service
    ports:
      - "8088:8088"

  notification-service:
    build: ./notification-service
    ports:
      - "8084:8084"
    depends_on:
      - kafka

  reward-service:
    build: ./reward-service
    ports:
      - "8089:8089"
    depends_on:
      - kafka

  api-gateway:
    build: ./api-gateway
    ports:
      - "8080:8080"
    depends_on:
      - user-service
      - transaction-service
      - notification-service
      - reward-service