server:
  port: 8080

spring:
  cloud:
    gateway:
      routes:

        - id: user-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/users/**

        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/auth/**

        - id: transaction-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/transactions/**

        - id: wallet-service
          uri: http://localhost:8088
          predicates:
            - Path=/api/v1/wallets/**

        - id: notification-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/notify/**

        - id: reward-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/rewards/**